<div class="register-container">
  <div class="glass-card register-card animate-fade">
    <div class="register-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h2>Ride<span>Link</span></h2>
      </div>
      <p class="subtitle">Join our student ride-sharing network</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div *ngIf="errorMessage" class="error-banner">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-banner">
        <span>✅</span> {{ successMessage }}
      </div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="e.g. John Doe" 
          [(ngModel)]="formData.name"
          required>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Choose a username" 
          [(ngModel)]="formData.username"
          required>
      </div>

      <div class="form-group">
        <label for="email">College Email ID</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="e.g. name@mitwpu.edu.in" 
          [(ngModel)]="formData.email"
          required>
      </div>

      <div class="form-group">
        <label for="college">Select College</label>
        <select 
          id="college" 
          name="collegeId" 
          [(ngModel)]="formData.collegeId"
          required>
          <option [ngValue]="null" disabled selected>Choose your university</option>
          <option *ngFor="let c of colleges" [ngValue]="c.id">{{ c.name }} ({{ c.city }})</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Create password" 
          [(ngModel)]="formData.password"
          required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading || successMessage !== null">
        <span *ngIf="isLoading" class="spinner"></span>
        {{ isLoading ? 'Creating Account...' : 'Register' }}
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
  </div>
</div>
