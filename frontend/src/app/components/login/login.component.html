<div class="login-container">
  <div class="glass-card login-card animate-fade">
    <div class="login-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h2>Ride<span>Link</span></h2>
      </div>
      <p class="subtitle">Connect. Share. Commute.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div *ngIf="errorMessage" class="error-banner">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="usernameOrEmail">Username or Email</label>
        <input 
          type="text" 
          id="usernameOrEmail" 
          name="usernameOrEmail" 
          placeholder="Enter username or email" 
          [(ngModel)]="formData.usernameOrEmail"
          required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter password" 
          [(ngModel)]="formData.password"
          required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <div class="login-footer">
      <p>New to RideLink? <a routerLink="/register">Create an Account</a></p>
    </div>
  </div>
</div>
